<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="container">
  <div class="row justify-content-center">
    
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
      
      <div class="calculator card shadow-lg p-3">
        
        <input type="text" id="display" 
          class="form-control mb-3 text-end fs-4" 
          placeholder="0" readonly>

        <div class="row g-2">

          <!-- Row 1 -->
          <div class="col-3"><button class="btn btn-danger w-100" onclick="clearDisplay()">C</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="deleteLast()">⌫</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('(')">(</button></div>
          <div class="col-3"><button class="btn btn-warning w-100" onclick="append('/')">÷</button></div>

          <!-- Row 2 -->
          <div class="col-3"><button class="btn btn-info w-100" onclick="append('sin(')">sin</button></div>
          <div class="col-3"><button class="btn btn-info w-100" onclick="append('cos(')">cos</button></div>
          <div class="col-3"><button class="btn btn-info w-100" onclick="append('tan(')">tan</button></div>
          <div class="col-3"><button class="btn btn-warning w-100" onclick="append('*')">×</button></div>

          <!-- Row 3 -->
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('7')">7</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('8')">8</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('9')">9</button></div>
          <div class="col-3"><button class="btn btn-warning w-100" onclick="append('-')">−</button></div>

          <!-- Row 4 -->
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('4')">4</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('5')">5</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('6')">6</button></div>
          <div class="col-3"><button class="btn btn-warning w-100" onclick="append('+')">+</button></div>

          <!-- Row 5 -->
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('1')">1</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('2')">2</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('3')">3</button></div>
          <div class="col-3"><button class="btn btn-success w-100 h-100" onclick="calculate()">=</button></div>

          <!-- Row 6 -->
          <div class="col-6"><button class="btn btn-secondary w-100" onclick="append('0')">0</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('.')">.</button></div>
          <div class="col-3"><button class="btn btn-secondary w-100" onclick="append('Math.PI')">π</button></div>

        </div>

      </div>

    </div>
  </div>
</div>

</body></html>
